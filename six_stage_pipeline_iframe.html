<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Six-Stage Analytic Pipeline</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cr: #9E1B32;
    --cr-dk: #6B1122;
    --cr-pale: #F9EEF0;
    --gold: #C9A84C;
    --white: #ffffff;
    --off: #FAFAFA;
    --border: #E2CDCF;
    --text-dk: #1A0A0D;
    --text-md: #4A2830;
    --text-lt: #8C6068;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif;
    background: var(--white);
    color: var(--text-dk);
    font-size: 13px;
  }

  /* ── HEADER ── */
  .hdr {
    background: var(--cr);
    border-bottom: 3px solid var(--gold);
    padding: 10px 16px 8px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .hdr-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.2;
  }
  .hdr-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.75);
  }

  /* ── PROGRESS ── */
  .progress {
    display: flex;
    align-items: flex-start;
    padding: 10px 12px 4px;
    background: var(--off);
    border-bottom: 1px solid var(--border);
  }
  .step-dot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    flex: 1;
    cursor: pointer;
  }
  .dot-circle {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-lt);
    transition: all 0.18s;
  }
  .dot-circle.active {
    background: var(--cr);
    border-color: var(--cr);
    color: var(--white);
  }
  .dot-circle.done {
    background: var(--cr);
    border-color: var(--cr);
    color: var(--white);
    opacity: 0.45;
  }
  .dot-label {
    font-size: 9px;
    color: var(--text-lt);
    text-align: center;
    line-height: 1.25;
    max-width: 62px;
  }
  .dot-label.active { color: var(--cr); font-weight: 700; }
  .step-conn {
    flex: 1;
    height: 1.5px;
    background: var(--border);
    margin-top: 11px;
    max-width: 32px;
    transition: background 0.18s;
  }
  .step-conn.done { background: var(--cr); opacity: 0.4; }

  /* ── CARD ── */
  .card {
    margin: 10px 12px 0;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .card-banner {
    background: var(--cr);
    border-bottom: 2px solid var(--gold);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .s-badge {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.35);
    color: var(--white);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
  }
  .card-body {
    padding: 12px 14px 14px;
  }
  .card-sub {
    font-size: 12px;
    color: var(--text-md);
    line-height: 1.6;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  /* INPUT */
  .input-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 5px;
    margin-bottom: 9px;
    font-size: 11px;
    color: var(--text-md);
  }
  .input-row strong { color: var(--text-dk); font-weight: 700; }
  .input-tag {
    background: var(--off);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 8px;
    font-size: 11px;
    color: var(--text-md);
  }

  /* ARTIFACTS */
  .artifacts {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 7px;
    margin-bottom: 10px;
  }
  .artifact {
    background: var(--cr-pale);
    border: 1px solid var(--border);
    border-left: 3px solid var(--cr);
    border-radius: 6px;
    padding: 7px 9px;
  }
  .a-label {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-lt);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .a-val {
    font-size: 16px;
    font-weight: 700;
    color: var(--cr-dk);
    line-height: 1.1;
    margin-bottom: 2px;
  }
  .a-desc {
    font-size: 10px;
    color: var(--text-md);
    line-height: 1.35;
  }

  /* OUTPUT */
  .output-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .out-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-lt);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .out-arrow { color: var(--cr); font-size: 15px; flex-shrink: 0; }
  .out-tag {
    background: var(--cr);
    color: var(--white);
    border-radius: 5px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 700;
  }

  /* NAV */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px 10px;
  }
  .nav-btn {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dk);
    cursor: pointer;
    font-family: Arial, sans-serif;
    transition: background 0.14s;
  }
  .nav-btn:hover { background: var(--cr-pale); border-color: var(--cr); color: var(--cr); }
  .nav-btn.primary { background: var(--cr); border-color: var(--cr); color: var(--white); }
  .nav-btn.primary:hover { background: var(--cr-dk); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .counter { font-size: 11px; color: var(--text-lt); }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">Six-Stage Analytic Pipeline</div>
  <div class="hdr-sub">Feedback-Driven VR Training Study &nbsp;·&nbsp; AERA 2025</div>
</div>

<div class="progress" id="progress"></div>
<div class="card" id="stage-card"></div>

<div class="nav">
  <button class="nav-btn" id="btn-prev" onclick="go(-1)">&#8592; Prev</button>
  <span class="counter" id="counter"></span>
  <button class="nav-btn primary" id="btn-next" onclick="go(1)">Next &#8594;</button>
</div>

<script>
const S = [
  {
    lbl:"Behavioral\ncoding",
    title:"Behavioral coding",
    sub:"Full-screen video recordings annotated second-by-second using BORIS software by two trained raters. Coded data exported to CSV for downstream analysis, enabling precise reconstruction of each learner's action sequence.",
    ins:[],
    art:[
      {l:"Inter-rater reliability", v:"κ = .86",   d:"Cohen's kappa — strong agreement"},
      {l:"Total coded events",      v:"1,854",      d:"Discrete behavioral actions"},
      {l:"Avg. session length",     v:"~10.2 min",  d:"Per participant in VR simulation"}
    ],
    out:"Discrete behavioral category sequences"
  },
  {
    lbl:"Transition\nmatrix",
    title:"Transition matrix",
    sub:"Adjacent behavioral categories paired to form one-step transitions. Frequency of every transition type tallied into an N×N matrix capturing the structural pattern of behavioral flow per participant.",
    ins:["Category sequences (S1)"],
    art:[
      {l:"One-step transitions", v:"1,827",        d:"All adjacent behavior pairs"},
      {l:"Matrix structure",     v:"N × N",         d:"Each cell = transition frequency"},
      {l:"Key transitions",      v:"IR→IR, F→Task", d:"Loops vs. productive moves"}
    ],
    out:"Behavioral transition frequency matrix"
  },
  {
    lbl:"Entropy\ncurves",
    title:"Entropy curves",
    sub:"Shannon entropy computed per 10-second bin across 180-second window. High entropy = strategic variety (many behaviors); decreasing entropy = consolidation toward a focused, goal-directed strategy.",
    ins:["Transition matrix (S2)"],
    art:[
      {l:"Time window",       v:"180 sec",  d:"Per feedback event"},
      {l:"Temporal bins",     v:"18 × 10s", d:"Temporal resolution"},
      {l:"Total data points", v:"432",      d:"Entropy values across all participants"}
    ],
    out:"Entropy-over-time curve per participant"
  },
  {
    lbl:"Pre/post\ncomparison",
    title:"Pre/post comparison",
    sub:"Sequences 30s and 60s before and after each feedback event compared using permutation-based tests and mixed-effects regression. Confirms significance of behavioral shifts and identifies the critical entropy peak window.",
    ins:["Entropy curves (S3)", "Raw sequences (S1)"],
    art:[
      {l:"Windows tested",  v:"±30s / ±60s", d:"Pre/post feedback windows"},
      {l:"Entropy peak",    v:"38–46 sec",   d:"Critical restructuring window"},
      {l:"Significance",    v:"p < .05",     d:"Confirmed behavioral shifts"}
    ],
    out:"Significant shift metrics (Δ values & p-values)"
  },
  {
    lbl:"K-Means\nclustering",
    title:"K-Means clustering",
    sub:"Each learner represented by a 4-feature vector from post-feedback behavioral profile. K-Means groups learners by similarity; silhouette analysis confirms k=3 as optimal. t-SNE reduces to 2D for visualization.",
    ins:["ΔEntropy, ΔSuccess, latency, JS-dist (S4)"],
    art:[
      {l:"Features used",    v:"4",     d:"ΔEntropy, ΔSuccess, latency, JS-dist"},
      {l:"Optimal clusters", v:"k = 3", d:"Confirmed by silhouette analysis"},
      {l:"Silhouette score", v:"0.41",  d:"t-SNE for 2D cluster visualization"}
    ],
    out:"3 types: Fast Switchers · Explorers · Stuck Learners"
  },
  {
    lbl:"Cluster\ndynamics",
    title:"Cluster dynamics",
    sub:"Pre/post transition matrices compared per cluster. Jensen-Shannon distance measures structural change. Heatmaps show which transitions increased or decreased. Sankey diagrams trace behavioral flow pathways by learner type.",
    ins:["Cluster labels (S5)", "Transition matrices (S2)"],
    art:[
      {l:"Distance metric", v:"JS dist.", d:"Jensen-Shannon + Jaccard scores"},
      {l:"Heatmaps",        v:"Fig. 5",   d:"Before/after Δ per cluster"},
      {l:"Sankey diagrams", v:"Fig. 5",   d:"Behavioral pathway flow traces"}
    ],
    out:"Divergent post-feedback pathways by cluster"
  }
];

let cur = 0;

function render() {
  const s = S[cur];

  // Progress
  document.getElementById('progress').innerHTML = S.map((st,i) => {
    const cc = i < cur ? 'done' : i===cur ? 'active' : '';
    const lc = i===cur ? 'active' : '';
    const conn = i < S.length-1 ? `<div class="step-conn ${i<cur?'done':''}"></div>` : '';
    return `<div class="step-dot" onclick="jump(${i})">
      <div class="dot-circle ${cc}">${i+1}</div>
      <div class="dot-label ${lc}">${st.lbl.replace('\n','<br>')}</div>
    </div>${conn}`;
  }).join('');

  const ins = s.ins.length
    ? `<div class="input-row"><strong>From:</strong> ${s.ins.map(t=>`<span class="input-tag">${t}</span>`).join(' ')}</div>`
    : '';

  const arts = s.art.map(a =>
    `<div class="artifact"><div class="a-label">${a.l}</div><div class="a-val">${a.v}</div><div class="a-desc">${a.d}</div></div>`
  ).join('');

  document.getElementById('stage-card').innerHTML = `
    <div class="card-banner">
      <span class="s-badge">Stage ${cur+1} of 6</span>
      <div class="card-title">${s.title}</div>
    </div>
    <div class="card-body">
      <div class="card-sub">${s.sub}</div>
      ${ins}
      <div class="artifacts">${arts}</div>
      <div class="output-row">
        <span class="out-label">Output</span>
        <span class="out-arrow">&#8594;</span>
        <span class="out-tag">${s.out}</span>
      </div>
    </div>`;

  document.getElementById('counter').textContent = `${cur+1} / ${S.length}`;
  document.getElementById('btn-prev').disabled = cur===0;
  const nb = document.getElementById('btn-next');
  nb.disabled = cur===S.length-1;
  nb.textContent = cur===S.length-1 ? '✓ Done' : 'Next →';
}

function go(d){ if(cur+d>=0 && cur+d<S.length){cur+=d;render();} }
function jump(i){ cur=i; render(); }

render();
</script>
</body>
</html>
