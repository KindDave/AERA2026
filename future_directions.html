<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Future Directions — IVR Training Study</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, 'Helvetica Neue', sans-serif;
    background: #FAFAFA;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 0;
  }
  svg { display: block; width: 100%; max-width: 680px; }
</style>
</head>
<body>

<svg width="100%" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- HEADER -->
<rect x="0" y="0" width="680" height="60" fill="#6B1122"/>
<text font-family="Arial,sans-serif" font-size="19" font-weight="700" fill="#FFFFFF" x="340" y="24" text-anchor="middle" dominant-baseline="central">Future Directions</text>
<text font-family="Arial,sans-serif" font-size="12" fill="#C9A84C" x="340" y="46" text-anchor="middle" dominant-baseline="central">Feedback-Driven Strategic Shifts in IVR Training · AERA 2025</text>

<!-- CARD 1 — TOP CENTER  x=215 y=78 w=250 h=76 -->
<rect x="215" y="78" width="250" height="76" rx="8" fill="#1D9E75" stroke="#9FE1CB" stroke-width="1.5"/>
<text font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" x="340" y="100" text-anchor="middle" dominant-baseline="central">01 · Generalizability</text>

<text font-family="Arial,sans-serif" font-size="12" fill="#E1F5EE" x="340" y="132" text-anchor="middle" dominant-baseline="central">Diverse IVR scenarios beyond civil engineering</text>

<!-- CARD 2 — MID LEFT  x=20 y=210 w=220 h=90 -->
<rect x="20" y="210" width="220" height="90" rx="8" fill="#BA7517" stroke="#FAC775" stroke-width="1.5"/>
<text font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" x="130" y="234" text-anchor="middle" dominant-baseline="central">02 · Multimodal feedback</text>
<line x1="34" y1="248" x2="226" y2="248" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
<text font-family="Arial,sans-serif" font-size="12" fill="#FAEEDA" x="130" y="265" text-anchor="middle" dominant-baseline="central">Gaze tracking &amp; physiological</text>
<text font-family="Arial,sans-serif" font-size="12" fill="#FAEEDA" x="130" y="282" text-anchor="middle" dominant-baseline="central">data for optimal timing</text>

<!-- CARD 3 — MID RIGHT  x=440 y=210 w=220 h=90 -->
<rect x="440" y="210" width="220" height="90" rx="8" fill="#185FA5" stroke="#B5D4F4" stroke-width="1.5"/>
<text font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" x="550" y="234" text-anchor="middle" dominant-baseline="central">03 · Expand contexts</text>
<line x1="454" y1="248" x2="646" y2="248" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
<text font-family="Arial,sans-serif" font-size="12" fill="#E6F1FB" x="550" y="265" text-anchor="middle" dominant-baseline="central">K–12 VR STEM, healthcare</text>
<text font-family="Arial,sans-serif" font-size="12" fill="#E6F1FB" x="550" y="282" text-anchor="middle" dominant-baseline="central">simulation &amp; teacher PD</text>

<!-- HUB  cx=340 cy=325 r=50 -->
<circle cx="340" cy="325" r="50" fill="#9E1B32" stroke="#C9A84C" stroke-width="3"/>
<text font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" x="340" y="317" text-anchor="middle" dominant-baseline="central">Current</text>
<text font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" x="340" y="334" text-anchor="middle" dominant-baseline="central">study</text>

<!-- CARD 4 — BOT LEFT  x=20 y=440 w=220 h=90 -->
<rect x="20" y="440" width="220" height="90" rx="8" fill="#993556" stroke="#F4C0D1" stroke-width="1.5"/>
<text font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" x="130" y="464" text-anchor="middle" dominant-baseline="central">04 · Qualitative methods</text>
<line x1="34" y1="478" x2="226" y2="478" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
<text font-family="Arial,sans-serif" font-size="12" fill="#FBEAF0" x="130" y="495" text-anchor="middle" dominant-baseline="central">Think-alouds, reflections &amp;</text>
<text font-family="Arial,sans-serif" font-size="12" fill="#FBEAF0" x="130" y="512" text-anchor="middle" dominant-baseline="central">interviews for SRL depth</text>

<!-- CARD 5 — BOT RIGHT  x=440 y=440 w=220 h=90 -->
<rect x="440" y="440" width="220" height="90" rx="8" fill="#534AB7" stroke="#CECBF6" stroke-width="1.5"/>
<text font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" x="550" y="464" text-anchor="middle" dominant-baseline="central">05 · AI adaptive scaffolding</text>
<line x1="454" y1="478" x2="646" y2="478" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
<text font-family="Arial,sans-serif" font-size="12" fill="#EEEDFE" x="550" y="495" text-anchor="middle" dominant-baseline="central">Entropy-triggered systems—</text>
<text font-family="Arial,sans-serif" font-size="12" fill="#EEEDFE" x="550" y="512" text-anchor="middle" dominant-baseline="central">rigorous testing at scale</text>

<!-- CONNECTORS — drawn last so arrows sit on top of cards -->
<!-- Hub top → Card 1 bottom -->
<line x1="340" y1="275" x2="340" y2="156" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrow)"/>
<!-- Hub left → Card 2 right -->
<line x1="291" y1="308" x2="242" y2="272" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrow)"/>
<!-- Hub right → Card 3 left -->
<line x1="389" y1="308" x2="438" y2="272" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrow)"/>
<!-- Hub bot-left → Card 4 top -->
<line x1="300" y1="364" x2="180" y2="438" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrow)"/>
<!-- Hub bot-right → Card 5 top -->
<line x1="380" y1="364" x2="500" y2="438" stroke="#C9A84C" stroke-width="2" marker-end="url(#arrow)"/>

<!-- CAPTION -->
<text font-family="Arial,sans-serif" font-size="11.5" fill="#888780" x="340" y="558" text-anchor="middle" dominant-baseline="central">Five directions extending the behavioral-mining framework</text>

</svg>

</html>
